    <article class="card">

    <h2>Join the Cats Club</h2>
    
    <p> Wanna be part of the club? Fill out the form below to share your interest.
    Members can join activities, learn more about cats, and connect with other cat lovers.
    </p>

    <form>
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name">

        <label for="email">Email</label>
        <input type="email" id="email" name="email">

        <label for="hobby">Hobby</label>
        <input type="text" id="hobby" name="hobby">

        <label for="cat-type">Favorite type of cat</label>
        <input type="text" id="cat-type" name="cat-type">

        <label for="interest">Why do you want to join?</label>
        <textarea id="interest" name="interest"></textarea>

        <button type="submit">Submit</button>

    </form>
